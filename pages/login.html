<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login — ZEE CLOTHING</title>
  <link rel="stylesheet" href="/zee-clothing/css/main.css">
  <style>
    .auth-wrap { display: grid; grid-template-columns: 1fr 1fr; min-height: 100vh; }
    .auth-brand { background: var(--mid); border-right: 1px solid var(--border); display: flex; flex-direction: column; justify-content: space-between; padding: 48px; position: relative; overflow: hidden; }
    .brand-logo { font-family: 'Bebas Neue', sans-serif; font-size: 36px; letter-spacing: 4px; color: var(--white); }
    .brand-title { font-family: 'Bebas Neue', sans-serif; font-size: clamp(60px,7vw,92px); line-height: 0.92; }
    .brand-title span { color: var(--accent); display: block; }
    .brand-sub { margin-top: 18px; font-size: 14px; color: var(--muted); line-height: 1.7; max-width: 280px; }
    .brand-ghost { position: absolute; bottom: 30px; right: -20px; font-family: 'Bebas Neue', sans-serif; font-size: 180px; color: transparent; -webkit-text-stroke: 1px rgba(200,255,0,0.06); line-height: 1; user-select: none; pointer-events: none; }
    .brand-quote { font-family: 'Space Mono', monospace; font-size: 10px; letter-spacing: 2px; color: var(--muted); }
    .auth-form-panel { display: flex; align-items: center; justify-content: center; padding: 60px 40px; }
    .auth-box { width: 100%; max-width: 400px; }
    .auth-title { font-family: 'Bebas Neue', sans-serif; font-size: 48px; letter-spacing: 2px; margin-bottom: 6px; }
    .auth-sub { font-size: 13px; color: var(--muted); margin-bottom: 36px; }
    .divider { display: flex; align-items: center; gap: 12px; margin: 24px 0; }
    .divider-line { flex: 1; height: 1px; background: var(--border); }
    .divider-text { font-family: 'Space Mono', monospace; font-size: 9px; letter-spacing: 2px; color: var(--muted); text-transform: uppercase; }
    .google-btn { width: 100%; background: transparent; color: var(--white); border: 1px solid var(--border); font-family: 'Space Mono', monospace; font-size: 10px; letter-spacing: 2px; text-transform: uppercase; padding: 13px; cursor: pointer; transition: border-color 0.2s; display: flex; align-items: center; justify-content: center; gap: 10px; }
    .google-btn:hover { border-color: var(--white); }
    .forgot-link { font-family: 'Space Mono', monospace; font-size: 9px; letter-spacing: 1px; color: var(--muted); text-decoration: none; float: right; margin-top: -4px; transition: color 0.2s; }
    .forgot-link:hover { color: var(--white); }
    .auth-footer-link { margin-top: 24px; text-align: center; font-size: 13px; color: var(--muted); }
    .auth-footer-link a { color: var(--accent); font-weight: 700; }
    @media (max-width: 768px) { .auth-wrap { grid-template-columns: 1fr; } .auth-brand { display: none; } }
  </style>
</head>
<body>
<div class="toast-wrap" id="toastWrap"></div>

<div class="auth-wrap">
  <div class="auth-brand">
    <a href="/zee-clothing/index.html" class="brand-logo">ZEE</a>
    <div>
      <h2 class="brand-title">Welcome<br><span>Back.</span></h2>
      <p class="brand-sub">Your drops are waiting. Log in to access your orders, wishlist and exclusive early access.</p>
    </div>
    <p class="brand-quote">// Wear Your Identity</p>
    <div class="brand-ghost">ZEE</div>
  </div>

  <div class="auth-form-panel">
    <div class="auth-box">
      <h1 class="auth-title">Log In</h1>
      <p class="auth-sub">Good to have you back.</p>

      <div class="field">
        <label>Email Address</label>
        <input type="email" id="email" placeholder="you@example.com" autocomplete="email">
        <p class="field-error" id="emailErr"></p>
      </div>

      <div class="field">
        <label>Password <a href="/zee-clothing/pages/forgot-password.html" class="forgot-link">Forgot password?</a></label>
        <div class="pw-wrap">
          <input type="password" id="password" placeholder="••••••••" autocomplete="current-password">
          <button type="button" class="pw-toggle" id="togglePw">SHOW</button>
        </div>
        <p class="field-error" id="pwErr"></p>
      </div>

      <button class="btn btn-accent" style="width:100%; margin-top:8px;" id="loginBtn">
        <span class="btn-text">Log In</span>
      </button>

      <div class="divider"><div class="divider-line"></div><span class="divider-text">or</span><div class="divider-line"></div></div>

      <button class="google-btn" id="googleBtn">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none">
          <path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/>
          <path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/>
          <path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l3.66-2.84z" fill="#FBBC05"/>
          <path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/>
        </svg>
        Continue with Google
      </button>

      <div class="auth-footer-link">Don't have an account? <a href="/zee-clothing/pages/signup.html">Sign up free</a></div>
    </div>
  </div>
</div>

<script type="module">
  import { login, loginWithGoogle } from "/zee-clothing/js/auth.js";
  import { auth } from "/zee-clothing/js/firebase-config.js";
  import { onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";

  onAuthStateChanged(auth, user => {
    if (user) {
      const redirect = sessionStorage.getItem("redirectAfterLogin") || "/pages/account.html";
      sessionStorage.removeItem("redirectAfterLogin");
      window.location.href = redirect;
    }
  });

  function toast(msg, type="s") {
    const w = document.getElementById("toastWrap");
    const t = document.createElement("div");
    t.className = `toast ${type}`;
    t.innerHTML = `<span class="toast-icon">${type==="s"?"✓":"✕"}</span><span>${msg}</span>`;
    w.appendChild(t);
    setTimeout(() => t.remove(), 4000);
  }

  function setErr(id, msg) {
    const el = document.getElementById(id);
    el.textContent = msg; el.classList.toggle("show", !!msg);
  }

  document.getElementById("togglePw").addEventListener("click", () => {
    const inp = document.getElementById("password");
    const btn = document.getElementById("togglePw");
    inp.type = inp.type === "password" ? "text" : "password";
    btn.textContent = inp.type === "password" ? "SHOW" : "HIDE";
  });

  document.getElementById("loginBtn").addEventListener("click", async () => {
    setErr("emailErr",""); setErr("pwErr","");
    const email = document.getElementById("email").value.trim();
    const pw    = document.getElementById("password").value;
    if (!email) { setErr("emailErr","Email is required."); return; }
    if (!pw)    { setErr("pwErr","Password is required."); return; }

    const btn = document.getElementById("loginBtn");
    btn.classList.add("loading"); btn.disabled = true;
    try {
      await login(email, pw);
      toast("Welcome back! 🔥");
    } catch(err) {
      btn.classList.remove("loading"); btn.disabled = false;
      const map = {
        "auth/invalid-credential": "Invalid email or password.",
        "auth/user-not-found": "No account found with this email.",
        "auth/wrong-password": "Incorrect password.",
        "auth/too-many-requests": "Too many attempts. Try again later.",
        "auth/user-disabled": "This account has been disabled."
      };
      toast(map[err.code] || err.message, "e");
    }
  });

  // Enter key
  document.getElementById("password").addEventListener("keydown", e => {
    if (e.key === "Enter") document.getElementById("loginBtn").click();
  });

  document.getElementById("googleBtn").addEventListener("click", async () => {
    try {
      await loginWithGoogle();
      toast("Welcome! 🔥");
    } catch(err) {
      if (err.code !== "auth/popup-closed-by-user") toast(err.message, "e");
    }
  });
</script>
</body>
</html>
